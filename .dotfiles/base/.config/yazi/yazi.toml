# "$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

# Yazi 26.1.22 profile for a Linux/Wayland desktop.
#
# The defaults are already shipped with Yazi, so this file intentionally
# overrides the high-value parts and uses prepend/append rules where possible.
# That keeps the setup powerful without freezing Yazi's upstream defaults.

[mgr]
# Three-pane layout: parent | current | preview.
# A wide preview pane is friendlier for images, PDFs, code, and archives.
ratio = [1, 4, 4]

# "natural" makes 2.txt sort before 10.txt. This is the most ergonomic default
# for mixed human/project filenames.
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = true

# Show one compact bit of metadata on each row. Use "mtime" if you care more
# about recency than size.
linemode = "size"

# Power-user default: dotfiles are visible, symlink targets are explicit.
show_hidden = true
show_symlink = true

# Keep context around the cursor while moving.
scrolloff = 8

# Click and scroll are enough for day-to-day use; keeping drag/move disabled
# avoids extra terminal event noise.
mouse_events = ["click", "scroll"]

title_format = "Yazi: {cwd}"

[preview]
# Wrap long lines in previews so README/log/config files are readable in a
# split terminal. Set to "no" if you prefer exact code layout over readability.
wrap = "yes"
tab_size = 4

# Higher than upstream defaults for modern terminals, but still conservative
# enough to avoid giant caches. Run `yazi --clear-cache` after changing these.
max_width = 2400
max_height = 3600
cache_dir = ""

# Slight delay prevents image protocols from stuttering while you scroll fast.
image_delay = 50
image_filter = "catmull-rom"
image_quality = 90

# Keep the upstream geometry for ueberzug-compatible terminals. If image
# previews are offset on a fractional-scaled Wayland display, tune these.
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '${EDITOR:-vim} %s', desc = "$EDITOR", block = true, for = "unix" },
]

open = [{ run = "xdg-open %s1", desc = "Open", orphan = true, for = "linux" }]

reveal = [
  { run = "xdg-open %d1", desc = "Reveal in file manager", orphan = true, for = "linux" },
]

play = [
  { run = "mpv --force-window %s", desc = "Play with mpv", orphan = true, for = "linux" },
]

extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]

download = [
  { run = "ya emit download --open %S", desc = "Download and open" },
  { run = "ya emit download %S", desc = "Download" },
]

copy_path = [
  { run = "printf '%s\n' %s | wl-copy", desc = "Copy path", for = "linux" },
]

[open]
# These rules take priority over Yazi's defaults, while the built-in fallback
# rules remain available for file types not listed here.
prepend_rules = [
  # Directories
  { url = "*/", use = [
    "edit",
    "open",
    "reveal",
    "copy_path",
  ] },

  # Plain text, source code, structured data, and empty files
  { mime = "text/*", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },
  { mime = "application/{json,ndjson,toml,yaml,yml}", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },
  { mime = "inode/empty", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },

  # Common project files whose MIME type can be inconsistent
  { url = "*.{md,markdown,org,txt,log,conf,cfg,ini,env,lock}", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },
  { url = "*.{nix,lua,py,js,ts,tsx,jsx,rs,go,sh,zsh,bash,fish,nu}", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },
  { url = "*.{toml,json,jsonc,yaml,yml,xml,csv,tsv}", use = [
    "edit",
    "reveal",
    "copy_path",
  ] },

  # Images, PDFs, office documents
  { mime = "image/*", use = [
    "open",
    "reveal",
    "copy_path",
  ] },
  { mime = "application/pdf", use = [
    "open",
    "reveal",
    "copy_path",
  ] },
  { url = "*.{doc,docx,xls,xlsx,ppt,pptx,odt,ods,odp}", use = [
    "open",
    "reveal",
    "copy_path",
  ] },

  # Audio/video
  { mime = "{audio,video}/*", use = [
    "play",
    "open",
    "reveal",
    "copy_path",
  ] },

  # Archives and disk images
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
    "reveal",
    "copy_path",
  ] },
  { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", use = [
    "extract",
    "reveal",
    "copy_path",
  ] },
  { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", use = [
    "extract",
    "reveal",
    "copy_path",
  ] },
  { url = "*.{AppImage,appimage,img,iso,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", use = [
    "extract",
    "reveal",
    "copy_path",
  ] },

  # Yazi virtual file system entries
  { mime = "vfs/{absent,stale}", use = "download" },
]

append_rules = [
  # Last-resort fallback with a manual "copy path" option in the open menu.
  { url = "*", use = ["open", "reveal", "copy_path"] },
]

[tasks]
# Micro tasks: mime detection, thumbnails, small previews.
micro_workers = 20

# Macro tasks: copy/move/delete/extract. Keeping this lower avoids saturating IO.
macro_workers = 10
bizarre_retry = 5

# Hide background preload tasks from the task manager and quit confirmation.
suppress_preload = true

# Safety limits for decoding very large images.
image_alloc = 1073741824     # 1 GiB
image_bound = [20000, 20000]

[plugin]
# Extra preview hints for file types that are often misdetected as generic
# binary data. Built-in Yazi previewers still handle the common cases.
prepend_previewers = [
  { url = "*.{md,markdown,org,txt,log,conf,cfg,ini,env,lock}", run = "code" },
  { url = "*.{nix,lua,py,js,ts,tsx,jsx,rs,go,sh,zsh,bash,fish,nu}", run = "code" },
  { url = "*.{toml,jsonc,yaml,yml,xml,csv,tsv}", run = "code" },
  { url = "*.ipynb", run = "json" },
]

[input]
cursor_blink = false

# Keep prompts near the top so they do not cover the current row/preview.
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 60, 3]

create_title = ["Create:", "Create directory:"]
create_origin = "top-center"
create_offset = [0, 2, 60, 3]

rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 60, 3]

filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 60, 3]

find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 60, 3]

search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 70, 3]

shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 70, 3]

[confirm]
trash_title = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

overwrite_title = "Overwrite file?"
overwrite_body = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [0, 0, 60, 15]

quit_title = "Quit?"
quit_body = "There are unfinished tasks, quit anyway?\nOpen task manager with the default key 'w'."
quit_origin = "center"
quit_offset = [0, 0, 60, 15]

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 60, 10]

[which]
# Preserve Yazi's keybinding order in the help menu.
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = true
